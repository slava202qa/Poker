services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # On a DB bootstrapped via SQLAlchemy create_all (no alembic_version table),
    # stamp head so Alembic knows all tables exist, then upgrade is a no-op.
    # On a fresh DB the stamp is skipped because alembic_version already exists.
    command: >
      sh -c "alembic stamp head 2>/dev/null || true && alembic upgrade head"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file: .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  ton_listener:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: python ton_listener.py
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    restart: unless-stopped

volumes:
  pgdata:
  certs:
  certbot-www:
